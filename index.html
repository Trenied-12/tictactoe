<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Tic Tac Toe GROOOOOß!</h1>

<p id="playerInfo"></p>
<p id="connectionInfo">Verbunden: 0</p>

<div id="board">
    <div class="cell" data-index="0"></div>
    <div class="cell" data-index="1"></div>
    <div class="cell" data-index="2"></div>
    <div class="cell" data-index="3"></div>
    <div class="cell" data-index="4"></div>
    <div class="cell" data-index="5"></div>
    <div class="cell" data-index="6"></div>
    <div class="cell" data-index="7"></div>
    <div class="cell" data-index="8"></div>
</div>

<p id="status">Lade...</p>

<div id="endgameScreen" class="overlay hidden">
    <div class="endgame-card">
        <h2 id="endgameTitle">Spiel beendet</h2>
        <p id="endgameResult"></p>

        <div class="ready-list">
            <p id="readyXText">Spieler X: nicht bereit</p>
            <p id="readyOText">Spieler O: nicht bereit</p>
        </div>

        <p id="readySummaryText">Warte auf Bereitschaft...</p>

        <button id="readyBtn">Bereit für neues Spiel</button>

        <p id="endgameNote"></p>
    </div>
</div>

<script type="module" src="script.js"></script>

</body>
</html>
