<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Tic Tac Toe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<main class="game-shell">
    <h1>Ultimate Tic Tac Toe</h1>

    <section class="game-info" aria-live="polite">
        <p id="playerInfo">Spielerzuweisung laeuft...</p>
        <p id="connectionInfo">Verbunden: 0</p>
        <p id="status">Lade...</p>
        <p id="activeBoardInfo">Freie Brettwahl.</p>
    </section>

    <div id="board" aria-label="Ultimate Tic Tac Toe Spielfeld"></div>
</main>

<div id="endgameScreen" class="overlay hidden">
    <div class="endgame-card">
        <h2 id="endgameTitle">Spiel beendet</h2>
        <p id="endgameResult"></p>

        <div class="ready-list">
            <p id="readyXText">Spieler X: nicht bereit</p>
            <p id="readyOText">Spieler O: nicht bereit</p>
        </div>

        <p id="readySummaryText">Warte auf Bereitschaft...</p>

        <button id="readyBtn" type="button">Bereit fuer neues Spiel</button>

        <p id="endgameNote"></p>
    </div>
</div>

<script type="module" src="script.js"></script>

</body>
</html>
